name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --verbose

  build:
    needs: test
    strategy:
      matrix:
        include:
          # --- CLI builds (all platforms) ---
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: echofs-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: echofs-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: echofs-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: echofs-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: echofs-windows-amd64
          # --- GUI builds (native targets only). macOS GUI ships as the
          #     universal .app/.dmg from the macos-app job below, not here. ---
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: echofs-linux-amd64-gui
            features: gui
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: echofs-windows-amd64-gui
            features: gui

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install GUI system dependencies (Linux)
        if: matrix.features == 'gui' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz echofs
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact }}.zip echofs.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  macos-app:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            label: darwin-amd64
          - target: aarch64-apple-darwin
            label: darwin-arm64
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build .app, .dmg, and standalone GUI binary
        run: |
          chmod +x scripts/make-macos-app.sh
          ./scripts/make-macos-app.sh --dmg --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: echofs-${{ matrix.label }}-app
          path: |
            target/macos/EchoFS-${{ matrix.label }}.dmg
            target/macos/echofs-${{ matrix.label }}-gui.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, macos-app]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.dmg
