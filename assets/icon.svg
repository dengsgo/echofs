<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- EchoFS macOS app icon. Big Sur grid: 824x824 squircle centered on a
       1024 canvas (100px margins), corner radius ~185. Glyph mirrors the
       folder + echo-waves logo used in the web UI, recolored white. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a9bff"/>
      <stop offset="1" stop-color="#0060d6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>

  <!-- Glyph: folder + concentric echo waves, scaled/centered from the 24px logo.
       Source viewBox 0..24 mapped to a 512px box centered at (256..768). -->
  <g transform="translate(256,256) scale(21.333)" fill="none"
     stroke="#ffffff" stroke-linecap="round" filter="url(#shadow)">
    <path d="M2 6a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6z" stroke-width="1.8"/>
    <path d="M10 11a1.5 1.5 0 0 1 0 3" stroke-width="1.5"/>
    <path d="M12.5 9.5a4.5 4.5 0 0 1 0 6" stroke-width="1.5"/>
    <path d="M15 8a7 7 0 0 1 0 9" stroke-width="1.5"/>
  </g>
</svg>
